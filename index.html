<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bee… 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', sans-serif;
    color: #fff;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at 30% 20%, #2e1235 0%, #110d1a 50%, #05050a 100%);
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
body::before {
    content: ""; position: fixed; inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/noise.png");
    opacity: 0.04; pointer-events: none; z-index: 0;
}

/* ── CANVAS ── */
#starCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
#romanceLayer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 2; }

/* ── CONTAINER ── */
.container {
    width: 100%; max-width: 520px; height: 100dvh;
    display: flex; flex-direction: column; padding: 12px; z-index: 3;
    animation: fadeIn 0.8s ease both;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── HEADER ── */
.header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 6px 14px; font-size: 13px; color: #bbb;
    border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 4px; flex-shrink: 0;
}
.header-name {
    font-weight: 600; color: #eee; letter-spacing: 0.3px;
    display: flex; align-items: center; gap: 8px;
}
.online-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── AUDIO BUTTON ── */
#audioBtn {
    background: transparent; border: 1px solid rgba(255,77,109,0.5);
    color: #ff6b8a; padding: 7px 13px; border-radius: 10px;
    font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer;
    transition: all 0.25s ease; display: flex; align-items: center; gap: 5px;
}
#audioBtn:hover { background: rgba(255,77,109,0.12); border-color: #ff4d6d; color: #ff4d6d; }
.music-waves { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
.w-bar { width: 2px; border-radius: 1px; background: currentColor; opacity: 0.5; }
.w-bar.playing { opacity: 1; animation: waveAnim 0.7s ease-in-out infinite; }
.w-bar:nth-child(1){height:5px;animation-delay:0s}
.w-bar:nth-child(2){height:9px;animation-delay:0.1s}
.w-bar:nth-child(3){height:7px;animation-delay:0.2s}
@keyframes waveAnim { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1.4)} }

/* ── CHAT ── */
.chat {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    padding: 12px 4px 8px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,77,109,0.3); border-radius: 2px; }

/* ── BUBBLE ── */
.bubble {
    align-self: flex-end;
    background: linear-gradient(145deg, #2a1e30, #1c1626);
    padding: 12px 15px; border-radius: 18px 18px 4px 18px;
    max-width: 80%; font-size: 14.5px; line-height: 1.55;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    animation: bubbleIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    cursor: default;
}
.bubble.romantic {
    font-family: 'Dancing Script', cursive; font-size: 18px; text-align: center;
    background: linear-gradient(135deg, rgba(255,77,109,0.15), rgba(192,25,90,0.1));
    border: 1px solid rgba(255,120,140,0.3);
}
@keyframes bubbleIn {
    from { transform: scale(0.85) translateX(12px); opacity: 0; }
    to { transform: scale(1) translateX(0); opacity: 1; }
}

/* ── META ── */
.meta {
    font-size: 10px; color: #888; text-align: right; margin-top: 5px;
    display: flex; justify-content: flex-end; align-items: center; gap: 3px;
}
.tick { opacity: 0.7; font-size: 11px; }

/* ── TYPING ── */
.typing-indicator {
    align-self: flex-end; display: flex; gap: 4px; align-items: center;
    padding: 10px 14px; background: rgba(255,255,255,0.04);
    border-radius: 14px; animation: bubbleIn 0.3s ease both;
}
.typing-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #ff6b8a;
    animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce {
    0%,60%,100%{transform:translateY(0);opacity:0.4}
    30%{transform:translateY(-6px);opacity:1}
}

/* ── CURSOR ── */
.cursor::after { content: "|"; animation: blink 0.9s infinite; color: #ff6b8a; }
@keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }

/* ── INTERACTIVE HEARTS (GAME LAYER) ── */
.heart-zone {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    padding: 16px 8px; align-self: center; width: 100%; max-width: 320px;
    animation: bubbleIn 0.5s ease both;
}
.heart-btn {
    aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff6b8a, #c0195a);
    border: 2px solid rgba(255,255,255,0.2);
    font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(255,77,109,0.4), inset 0 -3px 8px rgba(0,0,0,0.2);
    transition: all 0.15s ease;
    animation: heartbeat 1.4s ease-in-out infinite;
}
.heart-btn:nth-child(2){animation-delay:0.2s}
.heart-btn:nth-child(3){animation-delay:0.4s}
.heart-btn:hover { transform: scale(1.1) rotate(3deg); box-shadow: 0 8px 24px rgba(255,77,109,0.6); }
.heart-btn:active { transform: scale(0.95); }
.heart-btn.revealed { 
    background: linear-gradient(135deg, #ff9eb5, #ff6b8a); 
    animation: none; pointer-events: none; 
}
@keyframes heartbeat {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.08)}
}

/* ── REVEAL CARD ── */
.reveal-card {
    align-self: center; max-width: 90%;
    background: linear-gradient(145deg, rgba(42,30,48,0.95), rgba(28,22,38,0.95));
    border: 1px solid rgba(255,120,140,0.4);
    border-radius: 20px; padding: 18px 20px;
    margin: 8px 0; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    cursor: pointer;
}
.reveal-card:hover { border-color: rgba(255,77,109,0.7); }
@keyframes cardPop {
    from { transform: scale(0.9) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}
.reveal-card .title {
    font-family: 'Dancing Script', cursive; font-size: 22px;
    color: #ffb3c1; margin-bottom: 8px;
}
.reveal-card .desc {
    font-size: 14px; color: #ddd; line-height: 1.6;
}
.reveal-card .hint {
    font-size: 11px; color: #888; margin-top: 10px; font-style: italic;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
    padding: 8px 16px; display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: #aaa; flex-shrink: 0;
}
.progress-bar {
    flex: 1; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
}
.progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #ff6b8a, #ff9eb5);
    border-radius: 2px; transition: width 0.4s ease;
}

/* ── NEXT BUTTON ── */
#nextBtn {
    flex-shrink: 0; margin-top: 10px; width: 100%; padding: 14px;
    background: linear-gradient(135deg, #ff4d6d, #c0195a);
    border: none; border-radius: 14px; color: white;
    font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 600;
    cursor: pointer; display: none;
    box-shadow: 0 6px 22px rgba(255,77,109,0.4);
    transition: all 0.25s ease; letter-spacing: 0.2px;
}
#nextBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,77,109,0.55); }
#nextBtn:active { transform: translateY(0); }

/* ── SPARKLE ── */
@keyframes sparklePop {
    0% { transform: translate(0,0) scale(1.3); opacity: 1; }
    100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}
.sparkle-el {
    position: fixed; pointer-events: none; z-index: 999;
    animation: sparklePop 0.65s ease-out forwards;
}

/* ── MOBILE SAFE AREA ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
    .container { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}

/* ── EMOJI FLOAT ── */
@keyframes floatEmoji {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
}
.float-emoji {
    display: inline-block; animation: floatEmoji 2s ease-in-out infinite;
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div id="romanceLayer"></div>

<div class="container">
    <div class="header">
        <div class="header-name">
            <div class="online-dot"></div>
            AlphaCyber4rt ✨
        </div>
        <button id="audioBtn" type="button" onclick="toggleAudio()">
            <span id="audioLabel">🎵 Putar</span>
            <div class="music-waves">
                <div class="w-bar" id="wb1"></div>
                <div class="w-bar" id="wb2"></div>
                <div class="w-bar" id="wb3"></div>
            </div>
        </button>
    </div>

    <div class="progress-wrap">
        <span>Progress</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">0/3</span>
    </div>

    <div class="chat" id="chat"></div>
    <button type="button" id="nextBtn" onclick="nextStage()">lanjut… 😏</button>
</div>

<audio id="audio" src="https://alphacyber4rt.github.io/File/beeee.MP3" loop preload="none"></audio>

<script>
/* ════════════════════════ STARS ════════════════════════ */
const canvas = document.getElementById('starCanvas'), ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const stars = Array.from({length:100},()=>({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*1.4+0.2, phase:Math.random()*Math.PI*2,
    spd:Math.random()*0.03+0.008, maxOp:Math.random()*0.55+0.25
}));
function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
        s.phase+=s.spd;
        const op=((Math.sin(s.phase)+1)/2)*s.maxOp;
        ctx.save(); ctx.globalAlpha=op; ctx.fillStyle='#fff';
        ctx.shadowBlur=5; ctx.shadowColor='rgba(255,180,210,0.7)';
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    requestAnimationFrame(drawStars);
}
drawStars();

/* ════════════════════════ PARTICLES ════════════════════════ */
const layer=document.getElementById('romanceLayer');
const PETALS=['🌹','🌸','🌷','✿'], HEARTS=['💖','💕','❤️','🩷','💗'];
function spawnPetal(){
    const el=document.createElement('div'); el.className='petal';
    el.textContent=PETALS[Math.floor(Math.random()*PETALS.length)];
    el.style.cssText=`left:${Math.random()*100}vw;font-size:${Math.random()*10+12}px;animation:fall ${Math.random()*4+5}s linear infinite;opacity:0.75`;
    layer.appendChild(el); setTimeout(()=>el.remove(),10000);
}
function spawnHeart(){
    const el=document.createElement('div'); el.className='heart';
    el.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
    el.style.cssText=`left:${Math.random()*100}vw;font-size:${Math.random()*8+11}px;animation:floatUp ${Math.random()*5+6}s linear infinite;opacity:0.65`;
    layer.appendChild(el); setTimeout(()=>el.remove(),11000);
}
setInterval(spawnPetal,600); setInterval(spawnHeart,850);

/* ════════════════════════ GAME DATA ════════════════════════ */
const gameData = {
    stages: [
        {
            intro: ["Bee…", "aku gak punya alasan buat ini 😌", "tapi kamu kebaca di kepala aku terus."],
            hearts: [
                { 
                    emoji: '💭', 
                    title: "Kalo kamu bertanya-tanya…",
                    desc: "Iya, itu kamu. Yang bikin aku senyum-senyum sendiri pas lagi scroll HP tengah malam. Yang bikin kopi jadi kurang pahit. Yang… ya, kamu tau lah 😏",
                    hint: "Klik kartu ini untuk lanjut →"
                },
                { 
                    emoji: '✨', 
                    title: "Fakta random tentang kamu:",
                    desc: "Kamu punya cara sendiri buat bikin hal biasa jadi spesial. Misalnya: cuma dengan <em>ada</em>, hari yang biasa-biasa aja tiba-tiba… berasa. Greget, kan? 😌",
                    hint: "Masih ada 1 lagi… klik ❤️"
                },
                { 
                    emoji: '🌙', 
                    title: "Janji kecil dari aku:",
                    desc: "Aku gak janji jadi yang paling hebat. Tapi aku janji: tiap kali kamu butuh tempat buat 'napas', aku di sini. Tanpa judgment. Tanpa buru-buru. Cuma… ada. 🤍",
                    hint: "Klik untuk simpan pesan ini ✨"
                }
            ],
            nextPrompt: "masih mau lanjut? 😏"
        },
        {
            intro: ["anehnya ya…", "kamu gak ngapa-ngapain", "tapi efeknya ganggu fokus aku 😏"],
            hearts: [
                { emoji: '🎯', title: "Kamu itu seperti…", desc: "Notifikasi yang gak bisa di-silent. Ganggu? Iya. Tapi justru yang paling dinanti. Setiap kali muncul… hati auto <em>deg</em>. 😅", hint: "Klik untuk lanjut →" },
                { emoji: '☕', title: "Kalo kamu kopi…", desc: "Kamu itu kopi pagi yang bikin melek, tapi juga kopi malam yang bikin betah lama-lama. Pahit-manisnya pas. Dan aku? Aku yang selalu nambah. Tanpa ragu. ☕💕", hint: "Terakhir nih… klik ❤️" },
                { emoji: '🗝️', title: "Rahasianya:", desc: "Aku simpen senyummu di tempat paling aman: di ingatan yang cuma bisa diakses pas aku lagi kangen. Password-nya? Namamu. 🤫✨", hint: "Klik untuk kunci pesan ini 🔐" }
            ],
            nextPrompt: "tahap terakhir… siap? 🌸"
        },
        {
            intro: ["aku sempet mikir…", "ini kebiasaan atau kamu emang beda aja?"],
            hearts: [
                { emoji: '🧭', title: "Jawabannya:", desc: "Kamu beda. Bukan karena kamu sempurna. Tapi karena cara kamu 'nggak sempurna'-nya itu… justru yang bikin aku nyaman. Like, <em>really</em> nyaman. 🤍", hint: "Klik untuk lanjut →" },
                { emoji: '🎨', title: "Kalo hidup itu kanvas…", desc: "Kamu bukan cuma warna favoritku. Kamu yang bikin seluruh lukisannya jadi… berarti. Tanpa kamu, sisanya cuma coretan. 🎨✨", hint: "Satu lagi… klik ❤️" },
                { emoji: '💌', title: "Pesan penutup:", desc: "Terima kasih udah jadi 'gangguan' terindah di hidupku. Aku gak minta kamu jadi apa-apa. Cukup jadi kamu. Itu udah lebih dari cukup. 🌙💖", hint: "Klik untuk simpan & senyum 😊" }
            ],
            nextPrompt: "selesai… tapi cerita kita? Masih panjang 😉"
        }
    ],
    endings: {
        saved: "Pesan udah disimpen di hati. Kapan-kapan dibuka lagi, ya? 🤍",
        shared: "Kalo mau, kamu bisa screenshot & simpan. Atau… kirim balik ke aku. Aku tunggu. 😏💌",
        secret: "Easter egg: kamu hebat. Dan iya, aku sengaja bikin ini buat kamu. 🎁✨"
    }
};

/* ════════════════════════ CHAT ENGINE ════════════════════════ */
let stageIndex=0, heartIndex=0, collected=0;
const chat=document.getElementById('chat'), nextBtn=document.getElementById('nextBtn');
const progressFill=document.getElementById('progressFill'), progressText=document.getElementById('progressText');

function getTime(){
    const d=new Date();
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function showTyping(cb){
    const ind=document.createElement('div'); ind.className='typing-indicator';
    ind.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chat.appendChild(ind); chat.scrollTop=chat.scrollHeight;
    setTimeout(()=>{ind.remove(); cb();}, 900);
}

function typeBubble(text, cb, romantic=false){
    showTyping(()=>{
        const bubble=document.createElement('div');
        bubble.className='bubble'+(romantic?' romantic':'');
        const span=document.createElement('span'); span.className='cursor';
        const meta=document.createElement('div'); meta.className='meta';
        meta.innerHTML=`${getTime()} <span class="tick">✓</span>`;
        bubble.appendChild(span); bubble.appendChild(meta); chat.appendChild(bubble);
        chat.scrollTop=chat.scrollHeight;
        let i=0;
        function tick(){
            if(i<text.length){
                span.textContent+=text[i++];
                chat.scrollTop=chat.scrollHeight;
                setTimeout(tick, Math.random()*25+15); // human-like typing
            }else{
                span.classList.remove('cursor');
                setTimeout(()=>{ const t=meta.querySelector('.tick'); t.textContent='✓✓'; t.style.color='#4fc3f7'; }, 500);
                cb();
            }
        } tick();
    });
}

function updateProgress(){
    const total=gameData.stages.length*3;
    const percent=Math.min(100, Math.round((collected/total)*100));
    progressFill.style.width=percent+'%';
    progressText.textContent=`${collected}/${total}`;
}

function playIntro(index){
    nextBtn.style.display='none';
    let i=0;
    function nextLine(){
        if(i<gameData.stages[index].intro.length){
            typeBubble(gameData.stages[index].intro[i++], ()=>setTimeout(nextLine, 600));
        }else{
            setTimeout(showHeartZone, 800);
        }
    } nextLine();
}

function showHeartZone(){
    const zone=document.createElement('div'); zone.className='heart-zone';
    [0,1,2].forEach(idx=>{
        const btn=document.createElement('button');
        btn.className='heart-btn'; btn.type='button';
        btn.textContent=gameData.stages[stageIndex].hearts[idx].emoji;
        btn.onclick=(e)=>{
            spawnSparkles(e.currentTarget);
            btn.classList.add('revealed');
            btn.style.pointerEvents='none';
            showRevealCard(idx);
        };
        zone.appendChild(btn);
    });
    chat.appendChild(zone); chat.scrollTop=chat.scrollHeight;
}

function showRevealCard(idx){
    const data=gameData.stages[stageIndex].hearts[idx];
    const card=document.createElement('div'); card.className='reveal-card';
    card.innerHTML=`<div class="title">${data.title}</div><div class="desc">${data.desc}</div><div class="hint">${data.hint}</div>`;
    card.onclick=(e)=>{
        spawnSparkles(e.currentTarget);
        card.style.transform='scale(0.98)'; setTimeout(()=>card.style.transform='', 150);
        collected++; updateProgress();
        // Auto hide after click + show next hint or finish
        setTimeout(()=>{
            if(collected%3===0 && collected<9){
                nextBtn.style.display='block';
                nextBtn.textContent=gameData.stages[stageIndex].nextPrompt;
            }else if(collected===9){
                showEnding();
            }
            card.style.opacity='0.7'; card.style.cursor='default'; card.onclick=null;
        }, 400);
    };
    chat.appendChild(card); chat.scrollTop=chat.scrollHeight;
}

function showEnding(){
    setTimeout(()=>{
        typeBubble(gameData.endings.saved, ()=>{}, true);
        setTimeout(()=>{
            typeBubble(gameData.endings.shared, ()=>{}, true);
            setTimeout(()=>{
                // Secret easter egg: type "rahasia" in console
                console.log("🤫 Kamu nemu easter egg! Pesan rahasia: "+gameData.endings.secret);
            }, 1200);
        }, 1500);
    }, 800);
}

function nextStage(){
    spawnSparkles(nextBtn);
    stageIndex++; heartIndex=0;
    if(stageIndex<gameData.stages.length){
        playIntro(stageIndex);
    }
    nextBtn.style.display='none';
}

/* ════════════════════════ SPARKLES ════════════════════════ */
const SPARKLE_SYMS=['✨','💖','🌸','⭐','💕','🌟','🦋','🌷'];
function spawnSparkles(el){
    if(!el) return;
    const rect=el.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    for(let i=0;i<10;i++){
        const sp=document.createElement('span');
        const angle=(i/10)*Math.PI*2, dist=Math.random()*60+30;
        sp.className='sparkle-el';
        sp.textContent=SPARKLE_SYMS[Math.floor(Math.random()*SPARKLE_SYMS.length)];
        sp.style.cssText=`left:${cx}px;top:${cy}px;font-size:${Math.random()*10+12}px;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(), 700);
    }
}

/* ════════════════════════ AUDIO ════════════════════════ */
const audio=document.getElementById('audio'), audioLbl=document.getElementById('audioLabel');
function setWave(on){ [1,2,3].forEach(i=>document.getElementById('wb'+i).classList.toggle('playing',on)); }
function toggleAudio(){
    if(audio.paused){
        audio.volume=0.35;
        audio.play().then(()=>{ audioLbl.textContent='⏸ Pause'; setWave(true); })
                   .catch(()=>{ audioLbl.textContent='⚠️ Gagal'; });
    }else{ audio.pause(); audioLbl.textContent='🎵 Putar'; setWave(false); }
}
